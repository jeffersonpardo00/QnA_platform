<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Details - Q&A Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-nav">
                <button class="back-button" onclick="goBack()">← Back to Questions</button>
                <h1>Question Details</h1>
            </div>
        </header>

        <main>
            <!-- Question Detail -->
            <div id="question-detail-container" class="question-detail-section">
                <div class="loading">Loading question...</div>
            </div>

            <!-- New Comment Form -->
            <div id="new-comment-form-container" class="new-comment-form">
                <!-- Will be populated -->
            </div>

            <!-- Comments Section -->
            <div id="comments-container" class="comments-section">
                <!-- Comments will be loaded here -->
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Q&A Platform. All rights reserved.</p>
        </footer>
    </div>

    <script src="detail.js"></script>
</body>
</html>
